<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        function sum(...nums) {
            return nums.reduce((a, b) => a + b, 0);
        }
        document.write(sum(1, 2, 3, 4)); // 10

    </script>
</body>

</html>
