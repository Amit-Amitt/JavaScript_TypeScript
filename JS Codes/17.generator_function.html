<body>
    <script>

        function* count() {
            yield "Amit";
            yield 2;
            yield 3;
            yield ["A", "B", "C"];
            yield* ["A", "B", "C"];
        }
        let gen = count();
        console.log(gen.next().value); // 1
        console.log("Charmy");
        console.log(gen.next().value); // 1   
        console.log(gen.next().value); // 1
        console.log(gen.next().value); // 1
        console.log(gen.next().value); // 1
        console.log(gen.next().value); // 1
        console.log(gen.next().value); // 1

    </script>
</body>
