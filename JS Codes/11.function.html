<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        function add() {
            let a = 10, b = 20;
            let c = a + b;
            document.write("sum =" + c);
        }
        add();

        function mul() {
            let a = 20, b = 30;
            let c = a * b;
            return c;
        }
        let result_mul = mul();
        document.write("mul =" + result_mul);

        function sub(a, b) {
            let c = a - b;
            document.write("sub =" + c);
        }
        sub(30, 10);

        function div(a, b) {
            let c = a / b;
            return c;
        }
        let result_div = div(4, 2);
        document.write("div=" + result_div);


    </script>
</body>

</html>
