<body>
    <script>
        g = "g = Global Scope";

        function scopeCheck() {
            var a = "var a = function scope";
            if (true) {
                let b = "let b = block scope";
                const c = "const c = block scope";
                document.write(g + "</br>");
                document.write(a + "</br>");
                document.write(b + "</br>");
                document.write(c + "</br><hr>");
            }
            document.write(g + "</br>");
            document.write(a + "</br><hr>");
            // document.write(b + "</br>");
            // document.write(c + "</br><hr>");
        }
        scopeCheck();
        document.write(g + "</br>");
        // document.write(a + "</br><hr>");
        // document.write(b + "</br>");
        // document.write(c + "</br><hr>");

    </script>
