<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>


        let food1 = "Pizza";
        let food2 = "Burger";
        let food3 = "Hotdog";
        let food4 = "noodles";

        function displayFood(...foods) {
            document.write(foods);
        }

        displayFood(food1, food2, food3, food4);

        document.write("<br>**************<br>");

        function combineString(...Data) {
            document.write(Data.join(' '));
        }

        combineString("Charmy", "Vora");

        document.write("<br>*********<br>");

        function msg(x, ...y) {
            document.write(x);
            document.write("<br>");
            document.write(y);
        }

        msg("How are you?", "Greet", "Thanks");

        document.write("<br>**************<br>");

        function add(...a) {
            let s = 0;
            for (i = 0; i < a.length; i++) {
                s += a[i];

            }
            document.write(s);
        }
        add(10, 20, 30);

        function sum(...nums) {
            let result = 0;
            for (let i = 0; i < nums.length; i++) {
                result += nums[i];

            }
            document.write(result);
        }

        sum(10, 20, 30, 40, 50, 80, 90, 40);




    </script>

</body>

</html>
