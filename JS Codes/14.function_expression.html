<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        let div = function division_num(a, b) {
            if (b == 0 && a == 0) {
                return division_num(a + 5, b + 3);

            }
            else {
                return a / b;
            }

        }
        document.write(div(0, 0));
    </script>
</body>

</html>
