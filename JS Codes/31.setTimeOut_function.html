<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <Script>
        function greet() {
            console.log("Hello");
        }
        greet();

        // setTimeout() is used to run a function after a specified time delay (in milliseconds).

        setTimeout(greet, 5000);

        // short syntax

        setTimeout(() => {
            console.log("I am learning JS");
        }, 4000);



    </Script>
</body>

</html>
